services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: garmin-weight-sync-app
    ports:
      - "3000:3000"
    environment:
      SERVER_PORT: 3000
      GARMIN_TOKEN_CACHE_PATH: /app/data/garmin_token.json
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: appuser
      DB_PASSWORD: apppass
      DB_NAME: garmin_weight_sync
    volumes:
      - ./data:/app/data
      # Mount .env read-only and let the app's godotenv loader read Garmin
      # credentials directly. This bypasses Compose's ${} interpolation,
      # which would otherwise collapse '$$' in the password to a single '$'.
      # DB_* / SERVER_PORT above win because godotenv only sets vars that
      # aren't already present in the environment.
      - ./.env:/app/.env:ro
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: garmin-weight-sync-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: garmin_weight_sync
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -prootpass --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mysql_data:
